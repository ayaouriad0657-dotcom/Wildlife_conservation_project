<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="card dashboard-card p-4" style="width: 420px;">

        <div class="text-center mb-4">
            <i class="bi bi-tree-fill fs-1" style="color: #009966;"></i>
            <h4 class="mt-2 brand-text">Wildlife Conservation System</h4>
            <p class="text-muted small">Staff Access Only</p>
        </div>

        <div id="errorMsg" class="alert alert-danger d-none"></div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="you@example.com">
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="••••••••">
        </div>

        <button class="btn btn-success w-100" onclick="handleLogin()">
            <i class="bi bi-box-arrow-in-right me-2"></i>Login
        </button>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="supabaseClient.js"></script>
    <script src="loginScript.js"></script>
</body>

</html>
