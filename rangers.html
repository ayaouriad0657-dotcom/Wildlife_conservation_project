<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rangers</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons (IMPORTANT FIX) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="navbar"></div>

<div class="container mt-4">

    <h3 class="mb-3">Rangers Management</h3>

    <!-- FORM -->
    <div class="card dashboard-card p-3 mb-4">

        <!-- Hidden ID field -->
        <input type="hidden" id="rangerId">

        <div class="row g-3">

            <div class="col-md-4">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" id="fullName">
            </div>

            <div class="col-md-4">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="email">
            </div>

            <div class="col-md-4">
                <label class="form-label">Experience Years</label>
                <input type="number" class="form-control" id="experienceYears" min="0">
            </div>

        </div>

        <div class="mt-3">
            <button class="btn btn-success" onclick="addRanger()">Add</button>
            <button class="btn btn-primary" onclick="updateRanger()">Update</button>
            <button class="btn btn-danger" onclick="deleteRanger()">Delete</button>
            <button class="btn btn-secondary" onclick="clearRangerForm()">Clear</button>
        </div>

    </div>

    <!-- TABLE -->
    <div class="card dashboard-card p-3">

        <h5>Rangers List</h5>

        <table class="table table-striped table-bordered mt-3">
            <thead class="table-success">
                <tr>
                    <th id="rangerID">ID</th>
                    <th id="fullName">Name</th>
                    <th id="email">Email</th>
                    <th id="experienceYears">Experience (Years)</th>
                </tr>
            </thead>

            <tbody id="rangersTable">
                <!-- Loaded from database -->
            </tbody>
        </table>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabaseClient.js"></script>
<script src="script.js"></script>
<script src="rangersScript.js"></script>
</body>
</html>
