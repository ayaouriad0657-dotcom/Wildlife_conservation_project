<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animals</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons (IMPORTANT FIX) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="navbar"></div>

    <div class="container mt-4">

        <h3 class="mb-3">Animals Management</h3>

        <!-- FORM -->
        <div class="card dashboard-card p-3 mb-4">

            <form id="animalForm" class="row g-3">

                <div class="col-md-3">
                    <label class="form-label">Animal Name</label>
                    <input type="text" class="form-control" id="animalName">
                </div>

                <div class="col-md-3">
                    <label class="form-label">Species</label>
                    <select class="form-control" id="species">
                        <option>Elephant</option>
                        <option>Tiger</option>
                        <option>Leopard</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Habitat</label>
                    <select class="form-control" id="habitat">
                        <option>Forest</option>
                        <option>Desert</option>
                        <option>River Area</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label">Gender</label>
                    <select class="form-control" id="gender">
                        <option>Male</option>
                        <option>Female</option>
                    </select>
                </div>

                <div class="col-12 mt-2">
                    <button type="button" class="btn btn-success">Add</button>
                    <button type="button" class="btn btn-primary">Update</button>
                    <button type="button" class="btn btn-danger">Delete</button>
                    <button type="reset" class="btn btn-secondary">Clear</button>
                </div>

            </form>

        </div>

        <!-- TABLE -->
        <div class="card dashboard-card p-3">

            <h5>Animals List</h5>

            <table class="table table-bordered table-striped mt-3">

                <thead class="table-success">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Species</th>
                        <th>Habitat</th>
                        <th>Gender</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="animalsTable">
                    <tr>
                        <td>1</td>
                        <td>Leo</td>
                        <td>Lion</td>
                        <td>Savannah</td>
                        <td>Male</td>
                        <td>
                            <button class="btn btn-sm btn-primary">Edit</button>
                            <button class="btn btn-sm btn-danger">Delete</button>
                        </td>
                    </tr>
                </tbody>

            </table>

        </div>

    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="script.js"></script>
<script src="animalsScript.js"></script>
</body>

</html>
