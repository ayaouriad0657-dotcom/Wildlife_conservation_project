<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habitats</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons (IMPORTANT FIX) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="navbar"></div>

<div class="container mt-4">

    <h3 class="mb-3">Habitats Management</h3>

    <!-- FORM -->
    <div class="card dashboard-card p-3 mb-4 ">

        <form id="habitatForm">
        <input type="hidden" id="habitatId">
        <div class="row g-3">

            <div class="col-md-4">
                <label class="form-label">Country</label>
                <input type="text" class="form-control" id="country">
            </div>

            <div class="col-md-4">
                <label class="form-label">Location</label>
                <input type="text" class="form-control" id="location">
            </div>

            <div class="col-md-4">
                <label class="form-label">Ecosystem Type</label>
                <input type="text" class="form-control" id="ecosystem">
            </div>

        </div>

        <div class="mt-3">
            <button class="btn btn-success" onclick="addHabitat()">Add</button>
            <button class="btn btn-primary" onclick="updateHabitat()">Update</button>
            <button class="btn btn-danger" onclick="deleteHabitat()">Delete</button>
            <button class="btn btn-secondary" onclick="clearHabitatForm()">Clear</button>
        </div>
        </form>
    </div>

    <!-- TABLE -->
    <div class="card dashboard-card p-3">

        <h5>Habitats List</h5>

        <table class="table table-striped table-bordered mt-3">
            <thead class="table-success">
                <tr>
                    <th>ID</th>
                    <th>Country</th>
                    <th>Location</th>
                    <th>Ecosystem</th>
                </tr>
            </thead>

            <tbody id="habitatsTable">
                <tr>
                    <td>1</td>
                    <td>Kenya</td>
                    <td>Maasai Mara</td>
                    <td>Savannah</td>
                </tr>
            </tbody>
        </table>

    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>
<script src="supabaseClient.js"></script>
<script src="auth.js"></script>
<script src="habitatsScript.js"></script>
</div>

</body>
</html>
