<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threats & Activities</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="navbar"></div>

<div class="container mt-4">

    <h3 class="mb-3">Threats & Conservation Activities</h3>

    <div class="row g-4">

        <!-- THREATS -->
        <div class="col-md-6">

            <div class="card dashboard-card p-3">

                <h5>Animal Threats</h5>

                <div class="mb-2">
                    <label class="form-label">Threat Type</label>
                    <input class="form-control">
                </div>

                <div class="mb-2">
                    <label class="form-label">Threat Level</label>
                    <input class="form-control">
                </div>

                <button class="btn btn-success">Add Threat</button>

                <table class="table table-striped table-bordered mt-3">
                    <thead class="table-success">
                        <tr>
                            <th>Type</th>
                            <th>Level</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr>
                            <td>Poaching</td>
                            <td>High</td>
                            <td>
                                <button class="btn btn-sm btn-danger">Delete</button>
                            </td>
                        </tr>
                    </tbody>
                </table>

            </div>

        </div>

        <!-- ACTIVITIES -->
        <div class="col-md-6">

            <div class="card dashboard-card p-3">

                <h5>Conservation Activities</h5>

                <div class="mb-2">
                    <label class="form-label">Activity Name</label>
                    <input class="form-control">
                </div>

                <div class="mb-2">
                    <label class="form-label">Status</label>
                    <input class="form-control">
                </div>

                <div class="mb-2">
                    <label class="form-label">Performed By</label>
                    <input class="form-control">
                </div>

                <button class="btn btn-success">Add Activity</button>

                <table class="table table-striped table-bordered mt-3">
                    <thead class="table-success">
                        <tr>
                            <th>Activity</th>
                            <th>Status</th>
                            <th>By</th>
                            <th>Actions</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr>
                            <td>Anti-Poaching Patrol</td>
                            <td>Ongoing</td>
                            <td>Ahmed</td>
                            <td>
                                <button class="btn btn-sm btn-primary">Edit</button>
                                <button class="btn btn-sm btn-danger">Delete</button>
                            </td>
                        </tr>
                    </tbody>
                </table>

            </div>

        </div>

    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="script.js"></script>
</body>
</html>
