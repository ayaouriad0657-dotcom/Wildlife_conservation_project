<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threats & Activities</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="navbar"></div>

<div class="container mt-4">

    <h3 class="mb-3">Threats & Conservation Activities</h3>

    <div class="row g-4">

        <!-- THREATS -->
        <div class="col-md-6">

            <div class="card dashboard-card p-3">

                <h5>Animal Threats</h5>

                <!-- Sighting -->
<div class="mb-2">
    <label class="form-label">Sighting</label>
    <select class="form-control" id="sighting">
        <option value="">-- Select Sighting --</option>
    </select>
</div>

<!-- Threat Type -->
<div class="mb-2">
    <label class="form-label">Threat Type</label>
    <input class="form-control" id="threatType" placeholder="e.g. Poaching">
</div>

<!-- Threat Level -->
<div class="mb-2">
    <label class="form-label">Threat Level</label>
    <select class="form-control" id="threatLevel">
        <option value="">-- Select Level --</option>
        <option value="Low">Low</option>
        <option value="Medium">Medium</option>
        <option value="High">High</option>
        <option value="Critical">Critical</option>
    </select>
</div>

                <button class="btn btn-success" onclick="addThreat()">Add Threat</button>

                <table class="table table-striped table-bordered mt-3">
                    <thead class="table-success">
                        <tr>
                            <th>Type</th>
                            <th>Level</th>
                            <th class="action-column">Actions</th>
                        </tr>
                    </thead>

                    <tbody id="threatsTable">
                        <!-- Loaded from database -->
                    </tbody>
                </table>

            </div>

        </div>

        <!-- ACTIVITIES -->
        <!-- ACTIVITIES -->
<div class="col-md-6">

    <div class="card dashboard-card p-3">

        <h5>Conservation Activities</h5>

        <!-- Threat -->
        <div class="mb-2">
            <label class="form-label">Threat</label>
            <select class="form-control" id="threatId">
                <option value="">Select Threat</option>
            </select>
        </div>

        <!-- Activity Name -->
        <div class="mb-2">
            <label class="form-label">Activity Name</label>
            <input class="form-control" id="activityName" placeholder="e.g. Anti-Poaching Patrol">
        </div>

        <!-- Status -->
        <div class="mb-2">
            <label class="form-label">Status</label>
            <select class="form-control" id="activityStatus">
                <option value="">Select Status</option>
                <option value="Planned">Planned</option>
                <option value="Ongoing">Ongoing</option>
                <option value="Completed">Completed</option>
            </select>
        </div>

        <!-- Ranger -->
        <div class="mb-2">
            <label class="form-label">Performed By</label>
            <select class="form-control" id="performedBy">
                <option value="">Select Ranger</option>
            </select>
        </div>

        <!-- Buttons -->
        <div class="mt-2">
            <button class="btn btn-success" onclick="addActivity()">Add Activity</button>
            <button class="btn btn-secondary" onclick="clearActivityForm()">Clear</button>
        </div>

        <!-- TABLE -->
        <table class="table table-striped table-bordered mt-3">
            <thead class="table-success">
                <tr>
                    <th>Activity</th>
                    <th>Status</th>
                    <th>By</th>
                    <th class="action-column">Actions</th>
                </tr>
            </thead>

            <tbody id="activitiesTable">
                <!-- Loaded from database -->
            </tbody>
        </table>

    </div>

</div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabaseClient.js"></script>
<script src="script.js"></script>
<script src="auth.js"></script>
<script src="threatsRanger.js"></script>
<script src="threatsScript.js"></script>
</body>
</html>
