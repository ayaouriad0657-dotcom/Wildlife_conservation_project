<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Wildlife Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons (IMPORTANT FIX) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar loads here -->
    <div id="navbar"></div>

    <!-- Main Content -->
    <div class="container mt-5">

        <div class="mb-4">
            <h2>Welcome Back</h2>
            <p>Monitor wildlife data, habitats, and conservation activities.</p>
        </div>

        <div class="row g-4">

            <div class="col-md-3">
                <div class="card dashboard-card">
                    <div class="card-body">
                        <h5>Total Animals</h5>
                        <h2>120</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card dashboard-card">
                    <div class="card-body">
                        <h5>Total Species</h5>
                        <h2>35</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card dashboard-card">
                    <div class="card-body">
                        <h5>Wildlife Sightings</h5>
                        <h2>80</h2>
                    </div>
                </div>
            </div>

            <div class="col-md-3">
                <div class="card dashboard-card">
                    <div class="card-body">
                        <h5>Active Threats</h5>
                        <h2>12</h2>
                    </div>
                </div>
            </div>

        </div>

        <div class="mt-4 mb-5">

            <button class="btn btn-success">Add Animal</button>
            <button class="btn btn-success">Add Sighting</button>
            <button class="btn btn-danger">Report Threat</button>

        </div>

        <div class="mt-5">

            <h4>Recent Sightings</h4>

            <table class="table table-bordered table-striped mt-3">

                <thead class="table-success">
                    <tr>
                        <th>Animal</th>
                        <th>Habitat</th>
                        <th>Ranger</th>
                        <th>Date</th>
                        <th>Threat Found</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>Elephant</td>
                        <td>Forest Zone</td>
                        <td>Ahmed</td>
                        <td>2026-02-10</td>
                        <td>No</td>
                    </tr>

                    <tr>
                        <td>Tiger</td>
                        <td>River Area</td>
                        <td>Fatima</td>
                        <td>2026-02-12</td>
                        <td>Yes</td>
                    </tr>
                </tbody>

            </table>

        </div>

    </div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
    <script src="script.js"></script>
</body>

</html>
