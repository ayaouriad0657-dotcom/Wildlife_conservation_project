<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sightings</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="navbar"></div>

<div class="container mt-4">

    <h3 class="mb-3">Wildlife Sightings</h3>

    <!-- FORM -->
    <div class="card dashboard-card p-3 mb-4">

        <!-- Hidden ID -->
        <input type="hidden" id="sightingId">

        <div class="row g-3">

            <div class="col-md-3">
                <label class="form-label">Animal</label>
                <select class="form-control" id="animal">
                    <option value="">Select Animal</option>
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Habitat</label>
                <select class="form-control" id="habitat">
                    <option value="">elect Habitat</option>
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Ranger</label>
                <select class="form-control" id="ranger">
                    <option value="">Select Ranger</option>
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label">Date</label>
                <input type="date" class="form-control" id="sightingDate">
            </div>

            <div class="col-md-3">
                <label class="form-label">Count</label>
                <input type="number" class="form-control" id="count" placeholder="Number of animals">
            </div>

            <div class="col-md-3">
                <label class="form-label">Threat Found</label>
                <select class="form-control" id="threatFound">
                    <option value="false">No</option>
                    <option value="true">Yes</option>
                </select>
            </div>

        </div>

        <div class="mt-3">
            <button class="btn btn-success" onclick="addSighting()">Add</button>
            <button class="btn btn-primary" onclick="updateSighting()">Update</button>
            <button class="btn btn-danger" onclick="deleteSighting()">Delete</button>
            <button class="btn btn-secondary" onclick="clearSightingForm()">Clear</button>
        </div>

    </div>

    <!-- TABLE -->
    <div class="card dashboard-card p-3">

        <h5>Recent Sightings</h5>

        <table class="table table-striped table-bordered mt-3">
            <thead class="table-success">
                <tr>
                    <th>Animal</th>
                    <th>Habitat</th>
                    <th>Ranger</th>
                    <th>Date</th>
                    <th>Count</th>
                    <th>Threat</th>
                </tr>
            </thead>

            <tbody id="sightingsTable">
                <!-- Loaded from database -->
            </tbody>
        </table>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="supabaseClient.js"></script>
<script src="script.js"></script>
<script src="sightingsScript.js"></script>
</body>
</html>
